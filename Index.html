<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animasjoner, transition og transform</title>
    <link rel="stylesheet" href="style.css"
</head>
<body>
    <section>
        <h2>Typing cursor animation</h2>
        <div class="typing">I dag er det fredag</div>
    </section>
    <section>
        <h2>Glow</h2>
        <div class="box neon">Hover me</div>
    </section>
    <section>
        <h2>Button animation</h2>
        <div class="btn">click me</div>
    </section>
    <section>
        <h2>Pulse effect</h2>
        <div class="box pulse"></div>
    </section>
    <section>
        <h2>Adv keyframe</h2>
        <div class="box advanced"></div>
    </section>
    <section>
        <h2>3d flip</h2>
        <div class="flip-card">
            <div class="flip-inner">
                <div class="front">Front</div>
                <div class="back">back</div>
            </div>
        </div>
    </section>
    
</body>
</html>
